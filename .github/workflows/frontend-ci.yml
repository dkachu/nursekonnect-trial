name: NurseKonnect Frontend Cloud Compiler Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  compile-production-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Codebase Repository Source Nodes
        uses: actions/checkout@v4

      - name: 2. Initialize Node.js High-Performance Environment
        uses: actions/setup-node@v4
        with:
          node-env: production
          node-version: 20
          cache: 'npm'

      - name: 3. Restore and Install Project Package Dependencies Tree
        run: npm ci

      - name: 4. Execute Webpack Multi-Stage Production Bundle Compilation
        run: npx next build
