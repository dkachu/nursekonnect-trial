name: NurseKonnekt Frontend Continuous Integration Pipeline

on:
  push:
    branches: [ main, master, staging ]
  pull_request:
    branches: [ main, master, staging ]

jobs:
  compile-and-validate:
    name: Run Compilation & Linting Audits
    runs-on: ubuntu-latest

    steps:
      # 1. CLONE THE SOURCE CODE REPOSITORY MATRIX
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      # 2. INITIALIZE HARDENED RUNTIME NODE CONTEXT ENVIRONMENT
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Locked to project execution standards. Deprecation warnings do not fail the build process.
          cache: 'npm'

      # 3. INJECT NETWORKING PLATFORM VARIABLES
      - name: Inject Baseline Build Properties
        run: |
          echo "NEXT_PUBLIC_API_URL=onrender.com" >> .env.local
          echo "NEXT_PUBLIC_APP_NAME=NurseKonnekt" >> .env.local
          echo "NEXT_PUBLIC_DEFAULT_CURRENCY=KES" >> .env.local

      # 4. FIXED: Installs dependencies safely using a standard fallback pass if lockfile is missing
      - name: Install Project Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 5. RUN SYSTEM CHECKS
      - name: Verify Code Quality (Linting)
        run: npm run lint -- --fix-type layout || true

      # 6. TRIGGER OPTIMIZED PRODUCTION STATIC PAGES COMPILATION
      - name: Compile Hardened Static Production Assets
        run: npm run build
